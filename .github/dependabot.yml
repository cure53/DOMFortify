version: 2
updates:
  # GitHub Actions, weekly and grouped. Dependabot keeps the pinned versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
  # Dev/build/test tooling (the package ships zero runtime deps). Group routine
  # minor/patch bumps into one reviewable PR; majors stay separate.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

# This workflow uses actions that are not certified by GitHub. They are provided
# by a third-party and are governed by separate terms of service, privacy
# policy, and support documentation.

name: Scorecard supply-chain security

on:
  # For the Branch-Protection check; only the default branch is supported.
  branch_protection_rule:
  # Keeps the Maintained check fresh and re-evaluates after CodeQL has settled.
  schedule:
    - cron: '24 17 * * *'
  # Lets a maintainer trigger the first run (and re-runs) by hand from the Actions
  # tab, instead of waiting for the daily cron - useful to publish the first report.
  workflow_dispatch:
  # NOTE: no 'push' trigger on purpose - running at merge time races the CodeQL
  # scan of the just-merged commit and makes the SAST check read as unchecked.

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # publish_results only works from the default branch.
    if: github.event.repository.default_branch == github.ref_name
    permissions:
      security-events: write # upload SARIF to the code-scanning dashboard
      id-token: write # publish results to the OpenSSF REST API
      contents: read # read commit history (the SAST evaluation window)
      actions: read # read workflow runs
      checks: read # read CodeQL check runs (the SAST signal)
      pull-requests: read # map merged commits to their PRs
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # A fine-grained PAT enables the Branch-Protection check on a public repo;
          # without it we fall back to the built-in token so the run still publishes.
          # Create the PAT per https://github.com/ossf/scorecard-action#authentication-with-fine-grained-pat-optional
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
